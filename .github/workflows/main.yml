name: Build and verify PDFs

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    name: Build thesis PDFs
    runs-on: ubuntu-latest
    container: { image: 'aergus/latex' }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build the thesis
        run: latexmk -lualatex --shell-escape thesis
        
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Thesis
          path: |
            *.pdf

  verify:
    name: Verify PDF/A
    runs-on: ubuntu-latest
    needs: build
    container: { image: 'ghcr.io/mff-cuni-cz/cuni-thesis-validator' }

    steps:
      - uses: actions/checkout@v4

      - name: Get PDFs
        uses: actions/download-artifact@v4

      - name: Run VeraPDF
        run: verify Thesis/*.pdf | tee /dev/stderr | grep -qE 'nonCompliant="0"'
